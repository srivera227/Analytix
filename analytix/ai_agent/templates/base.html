<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación{% endblock %}</title>
    <link rel="stylesheet" href="/analytix/ai_agent/static/styles.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <!-- Logo de la app -->
        <div class="logo-section">
            <a href="{% url 'home' %}" class="logo">
                <div class="logo-icon">A</div>
                <span>AnalytiX</span>
            </a>
        </div>

        <!-- Navegación principal -->
        <nav class="nav">
            <!-- Home -->
            <a href="{% url 'home' %}" class="nav-item {% block home_active %}{% endblock %}">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
          <!-- Connection -->
            <a href="{% url 'historialChats' %}" class="nav-item {% block connection_active %}{% endblock %}">
                <span class="nav-icon">💬</span>
                <span>Chats</span>
            </a>

            <!-- Connection -->
            <a href="{% url 'connection' %}" class="nav-item {% block connection_active %}{% endblock %}">
                <span class="nav-icon">🔌</span>
                <span>Connection</span>
            </a>

                
        </nav>

        <!-- Información del usuario -->

        <div class="user-info">
            <div class="user-avatar">
            </div>
            <div class="user-details">
                <div class="user-name">{{ user.username }}</div>
                <div class="user-role">
                    
                </div>
            </div>
        </div>
  
    </div>

    <!-- Contenido principal -->
    <main class="main-content">
        <!-- Header dinámico -->
        <div class="content-header">
            <h1 class="page-title">
                Bienvenido a <span>Analytix</span>
            </h1>
            
            <!-- Fecha actual -->
            <div style="color: #667eea; font-weight: 500;">
                {% now "l, d F Y" %}
            </div>
        </div>

        <!-- Mensajes flash -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                <span>{{ message }}</span>
                <button class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Contenido específico de cada página -->
        <div class="content-card">
            {% block content %}
            {% endblock %}
        </div>
    </main>

   
</body>
</html>

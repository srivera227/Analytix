{% extends 'base.html' %}

{% load static %}

{% block styles %}
<style>

.chat-container{
    width: 100%;
    max-width: 700px;
    margin: auto;
    display: flex;
    flex-direction: column;
    height: 70vh;
}

.chat-box{
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.chat-input-container{
    display: flex;
    align-items: center;
    background: white;
    border-radius: 25px;
    border: 1px solid #ddd;
    padding: 10px;
    box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
}

.chat-input-container textarea{
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    padding: 10px;
}

.chat-input-container button{
    background: #10a37f;
    border: none;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 18px;
}

.chat-input-container button:hover{
    background: #0d8f6f;
}

.mensaje{
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user{
    background: #10a37f;
    color: white;
    margin-left: auto;
}

.bot{
    background: #e5e5e5;
}
</style>
{% endblock %}


{% block content %}

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <!-- mensajes -->
    </div>

    <div class="chat-input-container">
        <textarea id="chatInput" placeholder="Escribe un mensaje..."></textarea>
        <button id="btnEnviarPrompt">➤</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("chatInput");
    const btn = document.getElementById("btnEnviarPrompt");

    input.focus()

    // Función reutilizable
    function enviarMensaje() {
        if (input.value.trim() === "") return;

        chatBox.innerText += input.value + "\n";
        input.value = "";
    }

    // Click en botón
    btn.addEventListener("click", enviarMensaje);

    // Enter en el input
    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault(); // evita salto de línea si es textarea
            enviarMensaje();
        }
    });
</script>
{% endblock %}
